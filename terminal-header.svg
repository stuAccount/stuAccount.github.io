<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340">
  <!-- Background -->
  <rect width="680" height="340" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="680" height="40" rx="10" fill="#161b22"/>
  <rect y="30" width="680" height="10" fill="#161b22"/>
  <circle cx="20" cy="20" r="6.5" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="6.5" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6.5" fill="#28c840"/>
  <text x="340" y="25" text-anchor="middle" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">terminal — jesse zen</text>

  <!-- Separator line -->
  <line x1="0" y1="40" x2="680" y2="40" stroke="#30363d" stroke-width="1"/>

  <!-- Terminal content -->
  <!-- Prompt: green, Command: white, Output: gray -->

  <!-- jesse@github:~$ whoami -->
  <text x="20" y="68" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    <tspan fill="#7EE787">jesse@github:~$ </tspan><tspan fill="#e6edf3">whoami</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- > Jesse Zen — Java Backend Developer -->
  <text x="20" y="90" fill="#8b949e" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    &gt; Jesse Zen — Java Backend Developer
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.0s" fill="freeze"/>
  </text>

  <!-- jesse@github:~$ cat ~/interests.txt -->
  <text x="20" y="120" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    <tspan fill="#7EE787">jesse@github:~$ </tspan><tspan fill="#e6edf3">cat ~/interests.txt</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
  </text>

  <!-- > Backend Architecture · AI Integration -->
  <text x="20" y="142" fill="#8b949e" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    &gt; Backend Architecture · AI Integration
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/>
  </text>

  <!-- > Distributed Systems · LeetCode · Vim -->
  <text x="20" y="164" fill="#8b949e" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    &gt; Distributed Systems · LeetCode · Vim
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.9s" fill="freeze"/>
  </text>

  <!-- jesse@github:~$ echo $JOB_STATUS -->
  <text x="20" y="194" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    <tspan fill="#7EE787">jesse@github:~$ </tspan><tspan fill="#e6edf3">echo $JOB_STATUS</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
  </text>

  <!-- > 🟢 Open to work (use green circle instead of emoji) -->
  <text x="20" y="216" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    <tspan fill="#8b949e">&gt; </tspan><tspan fill="#28c840">●</tspan><tspan fill="#8b949e"> Open to work</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.3s" fill="freeze"/>
  </text>

  <!-- jesse@github:~$ cat ~/philosophy.txt -->
  <text x="20" y="246" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    <tspan fill="#7EE787">jesse@github:~$ </tspan><tspan fill="#e6edf3">cat ~/philosophy.txt</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.0s" fill="freeze"/>
  </text>

  <!-- > "Ship beats perfect — learn by building." -->
  <text x="20" y="268" fill="#8b949e" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    &gt; "Ship beats perfect — learn by building."
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.7s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="286" width="9" height="17" fill="#7EE787" rx="1" opacity="0">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" begin="6.2s"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="6.2s" fill="freeze"/>
  </rect>

  <!-- jesse@github:~$ (cursor line prompt) -->
  <text x="33" y="300" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    <tspan fill="#7EE787"> </tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="6.2s" fill="freeze"/>
  </text>
  <text x="20" y="300" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="14" opacity="0">
    <tspan fill="#7EE787">jesse@github:~$</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.0s" fill="freeze"/>
  </text>
</svg>
